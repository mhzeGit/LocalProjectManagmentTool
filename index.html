<!DOCTYPE html>
<html lang="en" class="theme-default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Board</title>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/timeline.css">
  <link rel="stylesheet" href="css/calendar.css">
  <link rel="stylesheet" href="css/document.css">
  <link rel="stylesheet" href="css/members.css">
  <link rel="stylesheet" href="css/filters.css">
  <link rel="stylesheet" href="css/preferences.css">
  <link rel="stylesheet" href="css/menubar.css">
</head>
<body>

<div class="menubar" id="menubar"></div>

<div class="app-body">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title" id="sidebarTitle">Task Board</span>
  </div>
  <div class="sidebar-section" id="sidebarContent">
    <div class="sidebar-hint">Select a project to view boards</div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span class="breadcrumb" id="breadcrumb"></span>
      <button class="save-btn" id="openFolderBtn" onclick="openFolder()">Open Folder</button>
    </div>
    <div class="topbar-right">

      <div class="board-io hidden" id="boardIO">
        <button class="btn-board-io" onclick="exportBoardCSV()" title="Export all tasks on this board as CSV">Export CSV</button>
        <button class="btn-board-io" onclick="importBoardCSV()" title="Import tasks from a CSV file into the first column">Import CSV</button>
      </div>
      <div class="view-switcher">
        <button class="view-btn active" data-view="kanban" onclick="switchView('kanban')">Kanban</button>
        <button class="view-btn" data-view="timeline" onclick="switchView('timeline')">Timeline</button>
        <button class="view-btn" data-view="calendar" onclick="switchView('calendar')">Calendar</button>
      </div>
      <div id="memberBar"></div>
    </div>
  </div>
  <div id="filterBar" class="hidden"></div>
  <div class="board-area" id="boardArea">
    <div class="empty-state">
      <p>Select or create a workspace to get started</p>
    </div>
  </div>
</div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
  </div>
</div>

<div class="save-notification" id="saveNotification"></div>

<div class="pref-overlay" id="preferences-overlay">
  <div class="pref-window">
    <div class="pref-header">
      <h3>Preferences</h3>
      <button class="pref-header-close" onclick="closePreferences()">✕</button>
    </div>
    <div class="pref-body">
      <div class="pref-sidebar" id="pref-sidebar"></div>
      <div class="pref-content" id="pref-content"></div>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
