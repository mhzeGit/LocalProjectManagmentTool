<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Project Management</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>Kanban Board</h1>
    <button class="btn-add" onclick="openModal('workspace')">+ Workspace</button>
  </div>
  <div class="sidebar-section" id="sidebarContent"></div>
</aside>

<div class="main">
  <div class="topbar">
    <span class="breadcrumb" id="breadcrumb"></span>
  </div>
  <div class="board-area" id="boardArea">
    <div class="empty-state">
      <p>Select or create a workspace to get started</p>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
